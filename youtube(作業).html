<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>YouTube仿作</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ===== Header ===== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 56px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid #ddd;
  z-index: 1000;
}

/* 左 */
.left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.menu {
  font-size: 20px;
  cursor: pointer;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

/* 中 */
.search {
  display: flex;
  width: 40%;
}

.search input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 20px 0 0 20px;
}

.search button {
  padding: 8px 16px;
  border: 1px solid #ccc;
  border-left: none;
  border-radius: 0 20px 20px 0;
  background: #f8f8f8;
  cursor: pointer;
}

/* 右 */
.right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.icon {
  cursor: pointer;
}

.avatar {
  width: 32px;
  height: 32px;
  background: #ccc;
  border-radius: 50%;
}

/* ===== Sidebar ===== */
.sidebar {
  position: fixed;
  top: 56px;
  left: 0;
  width: 200px;
  height: calc(100vh - 56px);
  background: #fff;
  border-right: 1px solid #ddd;
  padding: 10px;
  box-sizing: border-box;
  overflow-y: auto;
}

.sidebar div {
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.sidebar div:hover {
  background: #f0f0f0;
}

/* ===== Content ===== */
.content {
  position: absolute;
  top: 56px;
  left: 200px;
  width: calc(100% - 200px);
  height: calc(100vh - 56px);
  overflow-y: auto;
  padding: 20px;
  box-sizing: border-box;
  background: #f9f9f9;
}

/* ===== Grid ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* ===== Card ===== */
.card {
  cursor: pointer;
}

.thumb {
  width: 100%;
  height: 0;
  padding-bottom: 56.25%;
  background: #ccc;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover .thumb {
  transform: scale(1.03);
}

/* 文字 */
.info {
  display: flex;
  margin-top: 8px;
}

.channel-icon {
  width: 36px;
  height: 36px;
  background: #bbb;
  border-radius: 50%;
  margin-right: 10px;
}

.text {
  font-size: 14px;
}

.title {
  font-weight: bold;
  margin-bottom: 4px;
}

.channel {
  font-size: 12px;
  color: #666;
}
</style>

</head>

<body>

<!-- Header -->
<div class="header">
  <div class="left">
    <div class="menu">☰</div>
    <div class="logo">YouTube</div>
  </div>

  <div class="search">
    <input type="text" placeholder="搜尋">
    <button>🔍</button>
  </div>

  <div class="right">
    <div class="icon">＋</div>
    <div class="icon">🔔</div>
    <div class="avatar"></div>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div>🏠 首頁</div>
  <div>🎬 Shorts</div>
  <div>📺 訂閱內容</div>
  <hr>
  <div>🎵 音樂</div>
  <div>🎮 遊戲</div>
  <div>📰 新聞</div>
</div>

<!-- Content -->
<div class="content">
  <div class="grid">

    <!-- 15個影片 -->
    <!-- 複製即可 -->
    
    <!-- START -->
    <div class="card">
      <div class="thumb"></div>
      <div class="info">
        <div class="channel-icon"></div>
        <div class="text">
          <div class="title">影片標題</div>
          <div class="channel">頻道名稱</div>
        </div>
      </div>
    </div>

    <!-- 重複 -->
    <script>
      for(let i=0;i<14;i++){
        document.write(`
        <div class="card">
          <div class="thumb"></div>
          <div class="info">
            <div class="channel-icon"></div>
            <div class="text">
              <div class="title">影片標題</div>
              <div class="channel">頻道名稱</div>
            </div>
          </div>
        </div>
        `)
      }
    </script>

  </div>
</div>

</body>
</html>
